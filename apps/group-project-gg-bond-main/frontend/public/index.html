<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f472b6" />
    <title>Doggy Growth Plan 🐾</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fdf2f8; }
      #root { min-height: 100vh; min-height: 100dvh; }
    </style>
    <script>
      window.googleMapsReady = new Promise(function (resolve) {
        window.__initGoogleMaps = resolve;
      });
      window.gm_authFailure = function () {
        document.documentElement.setAttribute('data-gmaps-failed', 'true');
        document.dispatchEvent(new CustomEvent('gmaps-auth-failure'));
      };
    </script>
    <script
      async defer
      src="https://maps.googleapis.com/maps/api/js?key=%REACT_APP_GOOGLE_MAPS_KEY%&libraries=places&loading=async&callback=__initGoogleMaps"
    ></script>
  </head>
  <body>
    <noscript>请开启 JavaScript</noscript>
    <div id="root"></div>
  </body>
</html>
